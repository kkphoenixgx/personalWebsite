<div class="projects-matrix" [ngClass]="{'darkMode': isDarkMode$ | async, 'whiteMode': !(isDarkMode$ | async)}" role="main">
  
  <header class="matrix-header">
    <div class="hud-line"></div>
    <h1 class="glitch-title">SYSTEM_ARCHITECTURE</h1>
    <p class="subtitle">// DEEP DIVES INTO ENGINEERED ECOSYSTEMS</p>
  </header>

  <div class="module-list">
    <article class="sys-module" *ngFor="let project of projects; let i = index">
      
      <div class="module-index">
        <span class="num">0{{ i + 1 }}</span>
        <div class="vertical-line"></div>
      </div>
      
      <div class="module-content">
        <h2 class="module-title">{{ project.title }}</h2>
        
        <div class="module-grid">
          <div class="data-panel context-panel">
            <span class="panel-label">/** THE_PROBLEM */</span>
            <p>{{ project.context }}</p>
          </div>
          
          <div class="data-panel arch-panel">
            <span class="panel-label">/** SOLUTION_TOPOLOGY */</span>
            <p>{{ project.architecture }}</p>
          </div>
        </div>

        <div class="module-footer">
          <div class="tech-array">
            <span class="array-bracket">LOADED_MODULES: [</span>
            <span class="tech-node" *ngFor="let tech of project.techStack; let last = last">
              "{{ tech }}"<span class="comma" *ngIf="!last">, </span>
            </span>
            <span class="array-bracket">]</span>
          </div>
          
          <div class="action-terminal" *ngIf="project.internalRoute">
            <a [routerLink]="project.internalRoute" class="btn-access" [attr.aria-label]="'Initialize Case Study: ' + project.title">
              <span class="blink">></span> INITIALIZE_STUDY
            </a>
          </div>
        </div>
      </div>
    </article>
  </div>
</div>
