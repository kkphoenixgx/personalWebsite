<div class="articles-container stanford-theme" role="main">

  <!-- Modo Leitor (Reader Mode) - HTML Nativo Gerado a partir do PDF -->
  <div class="article-reader" *ngIf="selectedArticle; else gridMode">
    <button class="back-button" (click)="goBackToPublications()">&larr; Back to Publications</button>
    
    <div class="reader-header">
      <span class="reader-date">{{ selectedArticle.date }}</span>
      <h1>{{ selectedArticle.title }}</h1>
    </div>

    <div class="loading-content" *ngIf="isLoadingContent">
      <div class="spinner"></div>
      <p>Parsing PDF to HTML structure...</p>
    </div>

    <div class="error-content" *ngIf="!isLoadingContent && loadingError">
      <p class="error-message">Failed to load article</p>
      <p class="error-details">{{ loadingError }}</p>
    </div>

    <div class="reader-content" *ngIf="!isLoadingContent && !loadingError">
      <!-- Aqui as páginas entram com visual PERFEITO (incluindo imagens e fontes do PDF) -->
      <img class="pdf-page" *ngFor="let pageImg of articlePages; let i = index" 
           [src]="pageImg" 
           [alt]="'Page ' + (i + 1)">
    </div>
  </div>

  <!-- Modo Grid (Galeria) -->  
  <ng-template #gridMode>
  <div class="grid-mode">
    <div class="stanford-header">
      <h1 class="stanford-title">Articles & Publications</h1>
      <p class="stanford-subtitle">My academic research and technical papers.</p>
    </div>

    <div class="articles-grid">
      <a class="article-card" *ngFor="let article of articles" [routerLink]="['/articles', article.slug]">
        <div class="article-content">
          <div class="article-meta">
            <span class="article-date">{{ article.date }}</span>
          </div>
          <h2>{{ article.title }}</h2>
          <p class="article-description">{{ article.description }}</p>
          
          <span class="read-more">Read Article &rarr;</span>
        </div>
      </a>
    </div>
  </div>
  </ng-template>
</div>
