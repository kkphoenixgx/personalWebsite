<div class="configMenu-container" 
  [ngClass]=" {showConfigMenu : toggleConfigMenu,  hideConfigMenu: !toggleConfigMenu}"
>
  <div class="configMenu"
  [style.background-color]=" (toggleDarkMode$ | async) ? '#262626' : '#f5f5f5'"
  [style.color]=" (toggleDarkMode$ | async) ? '#ffffff' : '#000000'"
  role="dialog" aria-label="Configuration Menu"
  >
    <h3>Menu</h3>
    <div class="itemMenuConfig">
      
      <div class="toggleDarkModeItem"
        *ngIf="((toggleAnimations$ | async) && lampComponentRef); else elseTemplate" 
      >
        <label for="destroy-lamp-btn">Destroy Lamp</label>
        <button (click)="handleDestroyButton()" >Destroy!</button>
      </div>
      
      <ng-template #elseTemplate class="toggleLampItem">
        <label for="dark-mode-toggle">Toggle Dark Mode</label>
        <label class="switch">
          <input type="checkbox" id="dark-mode-toggle" [checked]="toggleDarkMode$ | async" aria-label="Toggle Dark Mode">
          <span class="slider" (click)="handleToggleDarkMode()" 
            [ngClass]="{'slider-on': toggleDarkMode$ | async, 'slider-off': !(toggleDarkMode$ | async) }"
          ></span>
        </label>
      </ng-template>
    </div>
    <div class="itemMenuConfig">
      <label for="animations-toggle">Toggle animations</label>
      <label class="switch">
        <input type="checkbox" id="animations-toggle" [checked]="toggleAnimations$ | async" aria-label="Toggle Animations">
        <span class="slider" (click)="handleToggleAnimations()"
          [ngClass]="{'slider-on': (toggleAnimations$ | async), 'slider-off': !(toggleAnimations$ | async)}"
        ></span>
      </label>
    </div>
  </div>
</div>

<ng-template #lampContainer></ng-template>
